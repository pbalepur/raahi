<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Raahi — Your Journeys</title>
  <meta name="description" content="Beautiful travel itineraries, all in one place.">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="is-landing">

  <header class="landing-header">
    <div class="container">
      <div class="landing-brand">
        <h1 class="landing-logo">Raahi</h1>
        <p class="landing-tagline">Your journeys, beautifully organized</p>
      </div>
    </div>
  </header>

  <main class="landing-main">
    <div class="container">
      <div class="trips-grid">

        <a href="japan.html" class="trip-tile">
          <div class="trip-tile-img">
            <img src="hero.jpg" alt="Mount Fuji at golden hour">
          </div>
          <div class="trip-tile-overlay"></div>
          <div class="trip-tile-content">
            <span class="trip-tile-season">Summer 2026</span>
            <h2 class="trip-tile-name">Japan</h2>
            <p class="trip-tile-route">Tokyo · Mt. Fuji · Kyoto · Kobe · Hiroshima</p>
            <div class="trip-tile-meta">
              <span>Jun 9 – 23</span>
              <span>15 days</span>
              <span>5 cities</span>
            </div>
          </div>
          <div class="trip-tile-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
          </div>
        </a>

        <div class="trip-tile trip-tile-placeholder">
          <div class="trip-tile-placeholder-inner">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            <span>Add a trip</span>
            <p>Coming soon</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="landing-footer">
    <div class="container">
      <p>Raahi — built with care</p>
    </div>
  </footer>

</body>
</html>
