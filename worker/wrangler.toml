name            = "raahi-worker"
main            = "src/index.js"
compatibility_date = "2025-01-01"
account_id      = "c8dbc520e7abfbf9706d2a637eb2af81"

# KV namespace — fill in `id` after running: wrangler kv namespace create RAAHI_KV
[[kv_namespaces]]
binding = "RAAHI_KV"
id      = "1ff06c7efd19442a85befe3bc726ef29"

# Public variables (non-secret)
[vars]
ALLOWED_ORIGIN    = "https://pbalepur.github.io"
VAPID_PUBLIC_KEY  = "BGwEX2T12X2xkmVvfoAs7DT8VLA2xTIC0jYO7pyKIHDmC3dAtEpeD8sVlIfJ1v-4AwplAfvBBPO2NoemRhIajIw"
VAPID_SUBJECT     = "mailto:bookings@heyraahi.com"

# Outbound email binding (for confirmation replies)
[[send_email]]
name = "SEND_EMAIL"

# Secrets (set via: wrangler secret put CLAUDE_API_KEY)
# CLAUDE_API_KEY — Anthropic API key

# Email routing — routes mail arriving at bookings@heyraahi.com to this worker
[[send_email]]
name = "bookings"
